    <header>

    <div class="caja-contenido">
        <h1>Escríbenos</h1>
        
        <form>
            <fieldset>
                <legend>Tus Datos</legend>
                
                <p>Nombre:</p>
                <input type="text" name="nombre">
                
                <p>¿Qué producto te interesa?</p>
                <select name="interes">
                    <option value="audifonos">Audífonos</option>
                    <option value="forros">Forros</option>
                    <option value="cargadores">Cargadores</option>
                    <option value="powerbanks">Power Banks</option>
                    <option value="todos">Todos</option>
                </select>
                
                <p>Fecha de visita a la tienda:</p>
                <input type="date" name="fecha">
                
                <p>¿Eres cliente frecuente?</p>
                <input type="radio" name="cliente" value="si"> Sí
                <input type="radio" name="cliente" value="no"> No
                
                <p>
                    <input type="submit" value="Enviar Mensaje" class="super-boton">
                </p>
            </fieldset>
        </form>
    </div>
